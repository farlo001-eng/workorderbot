<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkOrderBot — Tech View</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #F5F5F5; max-width: 480px; margin: 0 auto; }

.header { background: white; padding: 12px 16px 0; border-bottom: 0.5px solid #E0E0E0; position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.logo { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.count-badge { font-size: 11px; color: #666; background: #F5F5F5; padding: 3px 8px; border-radius: 20px; border: 0.5px solid #E0E0E0; }

.tabs { display: flex; }
.tab { flex: 1; text-align: center; font-size: 13px; padding: 10px 4px; color: #666; border-bottom: 2px solid transparent; cursor: pointer; }
.tab.active { color: #185FA5; border-bottom: 2px solid #185FA5; font-weight: 500; }

#tech-selector { background: white; padding: 10px 16px; border-bottom: 0.5px solid #E0E0E0; }
#tech-select { width: 100%; padding: 8px; border: 0.5px solid #E0E0E0; border-radius: 8px; font-size: 13px; background: white; }

.filter-bar { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; background: white; border-bottom: 0.5px solid #E0E0E0; }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid #E0E0E0; color: #666; background: white; white-space: nowrap; cursor: pointer; }
.chip.active { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; }

.wo-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }

.wo-card { background: white; border-radius: 12px; border: 0.5px solid #E0E0E0; padding: 10px 12px; cursor: pointer; border-left-width: 3px; }
.wo-card.p1 { border-left-color: #E24B4A; }
.wo-card.p2 { border-left-color: #EF9F27; }
.wo-card.p3 { border-left-color: #378ADD; }
.wo-card.p4 { border-left-color: #C0C0C0; }

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.wo-id { font-size: 10px; color: #888; }
.status-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; }
.badge-open { background: #FAECE7; color: #993C1D; }
.badge-in_progress { background: #E6F1FB; color: #185FA5; }
.badge-complete { background: #EAF3DE; color: #3B6D11; }
.badge-call { background: #EAF3DE; color: #3B6D11; }
.badge-web { background: #F1EFE8; color: #5F5E5A; }
.badge-nan { background: #FAECE7; color: #993C1D; }

.wo-desc { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 5px; line-height: 1.3; }
.wo-brief { font-size: 11px; color: #888; margin-bottom: 4px; font-style: italic; }
.wo-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.wo-meta span { font-size: 11px; color: #666; }
.wo-tech { margin-top: 4px; font-size: 11px; color: #666; }
.ai-reason { font-size: 11px; color: #888; margin-top: 5px; font-style: italic; border-top: 0.5px solid #F0F0F0; padding-top: 4px; }

.empty-state { text-align: center; color: #888; font-size: 13px; padding: 40px 20px; }

.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 0.5px solid #E0E0E0; display: flex; height: 60px; z-index: 10; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; }
.nav-item i { font-size: 20px; color: #999; }
.nav-item.active i { color: #185FA5; }
.nav-item span { font-size: 10px; color: #999; }
.nav-item.active span { color: #185FA5; }

/* DETAIL VIEW */
.detail-header { background: white; padding: 12px 16px; border-bottom: 0.5px solid #E0E0E0; position: sticky; top: 0; z-index: 10; }
.back-row { font-size: 13px; color: #185FA5; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.wo-title { font-size: 16px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; line-height: 1.3; }
.wo-sub { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.wo-sub span { font-size: 12px; color: #666; }
.priority-badge-1 { background: #FCEBEB; color: #A32D2D; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.priority-badge-2 { background: #FAEEDA; color: #854F0B; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.priority-badge-3 { background: #E6F1FB; color: #185FA5; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.priority-badge-4 { background: #F1EFE8; color: #5F5E5A; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

.detail-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 30px; }
.section-card { background: white; border-radius: 12px; border: 0.5px solid #E0E0E0; padding: 10px 12px; }
.section-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid #F0F0F0; }
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 12px; color: #666; }
.detail-val { font-size: 12px; color: #1a1a1a; font-weight: 500; text-align: right; max-width: 200px; }
.desc-text { font-size: 13px; color: #333; line-height: 1.6; }

.ai-box { background: #E6F1FB; border-left: 3px solid #378ADD; border-radius: 2px 10px 10px 2px; padding: 10px 12px; }
.ai-label { font-size: 11px; color: #185FA5; font-weight: 500; margin-bottom: 4px; }
.ai-text { font-size: 12px; color: #0C447C; line-height: 1.5; }

.caller-info { font-size: 12px; color: #333; }
.caller-info a { color: #185FA5; text-decoration: none; }
.access-box { background: #FAEEDA; border-left: 3px solid #EF9F27; border-radius: 2px 10px 10px 2px; padding: 10px 12px; }
.access-label { font-size: 11px; color: #854F0B; font-weight: 500; margin-bottom: 4px; }
.access-text { font-size: 12px; color: #633806; line-height: 1.5; }

.status-row { display: flex; gap: 6px; }
.status-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 0.5px solid #E0E0E0; font-size: 12px; text-align: center; color: #666; background: white; cursor: pointer; }
.status-btn.active-open { background: #FAECE7; color: #993C1D; border-color: #F0997B; font-weight: 500; }
.status-btn.active-in_progress { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; font-weight: 500; }
.status-btn.active-complete { background: #EAF3DE; color: #3B6D11; border-color: #97C459; font-weight: 500; }

#tech-notes-input { width: 100%; border: 0.5px solid #E0E0E0; border-radius: 8px; padding: 10px; font-size: 13px; background: white; color: #1a1a1a; resize: none; height: 80px; font-family: 'Inter', sans-serif; }

.photo-row { display: flex; gap: 8px; flex-wrap: wrap; }
.photo-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 0.5px solid #E0E0E0; }
.photo-add { width: 60px; height: 60px; border-radius: 8px; border: 1.5px dashed #C0C0C0; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

.save-btn { width: 100%; padding: 13px; background: #185FA5; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }
.save-btn:active { background: #0C447C; }
</style>
</head>
<body>

<div id="list-view">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <span class="logo">🔧 WorkOrderBot</span>
      <span id="wo-count" class="count-badge">— open</span>
    </div>
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="all">All work</div>
      <div class="tab" data-tab="mine">My properties</div>
      <div class="tab" data-tab="complete">Complete</div>
    </div>
  </div>

  <!-- Tech selector (shown only when "My properties" tab is active) -->
  <div id="tech-selector" style="display:none">
    <select id="tech-select">
      <option value="">Select your name...</option>
      <option value="Antonio Smith">Antonio Smith</option>
      <option value="Daniel Hall">Daniel Hall</option>
      <option value="Jonathan Morton">Jonathan Morton</option>
    </select>
  </div>

  <!-- Filter chips -->
  <div class="filter-bar">
    <div class="chip active" data-filter="all">All</div>
    <div class="chip" data-filter="1">P1 Emergency</div>
    <div class="chip" data-filter="2">P2 High</div>
    <div class="chip" data-filter="3">P3 Medium</div>
    <div class="chip" data-filter="4">P4 Routine</div>
  </div>

  <!-- Work order list -->
  <div id="wo-list" class="wo-list">
    <div class="empty-state">Loading work orders...</div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-list">
      <i>☰</i>
      <span>Work orders</span>
    </div>
    <div class="nav-item" id="nav-new" onclick="showNewWOForm()">
      <i>＋</i>
      <span>New WO</span>
    </div>
  </div>

</div>

<div id="detail-view" style="display:none">

  <!-- Header -->
  <div class="detail-header">
    <div class="back-row" onclick="showListView()">
      ← Back to work orders
    </div>
    <div id="detail-title" class="wo-title"></div>
    <div id="detail-meta" class="wo-sub"></div>
  </div>

  <!-- Scrollable body -->
  <div class="detail-body">

    <!-- Section 1: Property & Assignment -->
    <div class="section-card" id="detail-info"></div>

    <!-- Section 2: Caller info (only shown if caller_name exists) -->
    <div class="section-card" id="caller-info-card" style="display:none">
      <div class="section-label">Caller info</div>
      <div id="caller-info" class="caller-info"></div>
    </div>

    <!-- Section 3: Full description -->
    <div class="section-card">
      <div class="section-label">Full description</div>
      <div id="detail-description" class="desc-text"></div>
    </div>

    <!-- Section 4: Yardi brief -->
    <div class="section-card">
      <div class="section-label">Yardi brief</div>
      <div id="detail-brief" class="desc-text"></div>
    </div>

    <!-- Section 5: Access notes (only shown if non-empty) -->
    <div id="access-box" class="access-box" style="display:none">
      <div class="access-label">Access notes</div>
      <div id="access-notes-text" class="access-text"></div>
    </div>

    <!-- Section 6: AI reason box (only shown if ai_reason exists) -->
    <div id="ai-box" class="ai-box" style="display:none">
      <div class="ai-label">✦ AI priority reason</div>
      <div id="ai-reason-text" class="ai-text"></div>
    </div>

    <!-- Status selector -->
    <div class="section-card">
      <div class="section-label">Status</div>
      <div class="status-row">
        <div class="status-btn" data-status="open" onclick="setStatus('open')">Open</div>
        <div class="status-btn" data-status="in_progress" onclick="setStatus('in_progress')">In progress</div>
        <div class="status-btn" data-status="complete" onclick="setStatus('complete')">Complete</div>
      </div>
    </div>

    <!-- Tech notes -->
    <div class="section-card">
      <div class="section-label">Tech notes</div>
      <textarea id="tech-notes-input" placeholder="Add notes here…"></textarea>
    </div>

    <!-- Photos -->
    <div class="section-card">
      <div class="section-label">Photos</div>
      <div class="photo-row">
        <div id="photo-thumbs"></div>
        <label class="photo-add" for="photo-input">
          📷
        </label>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      </div>
    </div>

    <!-- Save button -->
    <button class="save-btn" onclick="saveChanges()">Save changes</button>

    <!-- Status message -->
    <div id="save-status" style="display:none; text-align:center; font-size:13px; padding:8px;"></div>

  </div>

</div>

<script>
let allWorkOrders = [];
let filteredOrders = [];
let currentTab = 'all';
let currentFilter = 'all';
let currentTech = '';
let currentWO = null;
let pendingStatus = '';
let pendingPhotos = [];

// --- helpers ---

function isEmptyValue(v) {
  if (v === null || v === undefined) return true;
  const s = String(v).trim().toLowerCase();
  return s === '' || s === 'nan' || s === 'none' || s === 'null';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function truncate(str, n) {
  if (!str) return '';
  const s = String(str);
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function normalizeStatus(status) {
  if (!status) return 'open';
  let s = String(status).trim().toLowerCase();
  if (s === 'nan' || s === 'null' || s === 'undefined' || s === '') return 'open';
  return s.replace(/\s+/g, '_');
}

function statusButtonValue(status) {
  const s = normalizeStatus(status);
  return (s === 'in_progress' || s === 'complete') ? s : 'open';
}

function statusLabel(status) {
  const map = {
    open: 'Open',
    in_progress: 'In progress',
    complete: 'Complete',
    call: 'Call',
    web: 'Web',
  };
  const s = normalizeStatus(status);
  return map[s] || 'Open';
}

function priorityNumber(p) {
  const n = parseInt(p, 10);
  return [1, 2, 3].includes(n) ? n : 4;
}

function sortKeyPriority(p) {
  if (p === null || p === undefined || p === '') return 99;
  const n = parseInt(p, 10);
  return isNaN(n) ? 99 : n;
}

function getExistingPhotos() {
  if (!currentWO) return [];
  try {
    const p = currentWO.photos;
    if (!p) return [];
    return typeof p === 'string' ? JSON.parse(p) : p;
  } catch (e) {
    return [];
  }
}

// --- data loading ---

async function loadWorkOrders() {
  const listEl = document.getElementById('wo-list');
  try {
    const res = await fetch('/api/workorders');
    allWorkOrders = await res.json();
    renderList();
  } catch (e) {
    listEl.innerHTML = '<div class="empty-state">Failed to load work orders.</div>';
  }
}

// --- list rendering ---

function renderCard(wo) {
  const n = priorityNumber(wo.ai_priority);
  const sClass = normalizeStatus(wo.status);
  const label = statusLabel(wo.status);

  const fallbackDesc = !isEmptyValue(wo.brief_desc)
    ? wo.brief_desc.trim()
    : (wo.description || '').slice(0, 80);
  const mainDesc = !isEmptyValue(wo.ai_summary) ? wo.ai_summary.trim() : fallbackDesc;

  const briefVal = !isEmptyValue(wo.brief_desc) ? wo.brief_desc.trim() : '';
  const briefHtml = (briefVal && briefVal !== mainDesc)
    ? `<div class="wo-brief">${escapeHtml(briefVal)}</div>`
    : '';

  const techDisplay = !isEmptyValue(wo.tech_name)
    ? wo.tech_name
    : (!isEmptyValue(wo.employee) ? wo.employee : 'Unassigned');

  return `
    <div class="wo-card p${n}" data-id="${escapeHtml(wo.id)}">
      <div class="card-top">
        <span class="wo-id">WO# ${escapeHtml(wo.id)} · ${wo.days_open ?? 0} days</span>
        <span class="status-badge badge-${sClass}">${label}</span>
      </div>
      <div class="wo-desc">${escapeHtml(mainDesc)}</div>
      ${briefHtml}
      <div class="wo-meta">
        <span>🏢 ${escapeHtml(wo.property_name || wo.property_code || '')}</span>
        <span>🏠 ${escapeHtml(wo.unit_number || '')}</span>
        <span>🔧 ${escapeHtml(wo.category || '')}</span>
      </div>
      <div class="wo-tech">
        <span>👤 ${escapeHtml(techDisplay)}</span>
      </div>
    </div>
  `;
}

function renderList() {
  let list = allWorkOrders.slice();

  if (currentTab === 'all') {
    list = list.filter(wo => normalizeStatus(wo.status) !== 'complete');
  } else if (currentTab === 'mine') {
    list = list.filter(wo => normalizeStatus(wo.status) !== 'complete');
    if (currentTech) {
      list = list.filter(wo => wo.tech_name === currentTech);
    }
  } else if (currentTab === 'complete') {
    list = list.filter(wo => normalizeStatus(wo.status) === 'complete');
  }

  if (currentFilter !== 'all') {
    const f = parseInt(currentFilter, 10);
    list = list.filter(wo => priorityNumber(wo.ai_priority) === f);
  }

  list.sort((a, b) => {
    const ap = sortKeyPriority(a.ai_priority);
    const bp = sortKeyPriority(b.ai_priority);
    if (ap !== bp) return ap - bp;
    return (b.days_open || 0) - (a.days_open || 0);
  });

  filteredOrders = list;

  document.getElementById('wo-count').textContent = `${list.length} open`;

  const listEl = document.getElementById('wo-list');
  if (list.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No work orders found.</div>';
    return;
  }
  listEl.innerHTML = list.map(renderCard).join('');
}

// --- detail view ---

function highlightStatusButtons(status) {
  const buttonValue = statusButtonValue(status);
  document.querySelectorAll('.status-btn').forEach(btn => {
    const btnStatus = btn.getAttribute('data-status');
    btn.className = 'status-btn' + (btnStatus === buttonValue ? ` active-${btnStatus}` : '');
  });
}

function renderPhotoThumbs(photos) {
  document.getElementById('photo-thumbs').innerHTML =
    photos.map(p => `<img class="photo-thumb" src="${p}">`).join('');
}

function openDetail(wo) {
  currentWO = wo;
  pendingStatus = wo.status;
  pendingPhotos = [];

  const n = priorityNumber(wo.ai_priority);

  const fallbackTitle = !isEmptyValue(wo.brief_desc)
    ? wo.brief_desc.trim()
    : truncate(wo.description || '', 80);
  const titleText = !isEmptyValue(wo.ai_summary) ? wo.ai_summary.trim() : fallbackTitle;

  document.getElementById('detail-title').textContent = titleText || `WO# ${wo.id}`;
  document.getElementById('detail-meta').innerHTML = `
    <span class="priority-badge-${n}">P${n}</span>
    <span>WO# ${escapeHtml(wo.id)}</span>
    <span>${wo.days_open ?? 0} days open</span>
  `;

  const techDisplay = !isEmptyValue(wo.tech_name)
    ? wo.tech_name
    : (!isEmptyValue(wo.employee) ? wo.employee : 'Unassigned');

  // Section 1: Property & Assignment
  const infoRows = [
    ['Property', wo.property_name || wo.property_code || '—'],
    ['Unit', wo.unit_number || '—'],
    ['Category', wo.category || '—'],
    ['Yardi priority', wo.priority || '—'],
    ['Assigned to', techDisplay],
    ['Scheduled', wo.scheduled_date || '—'],
    ['Call date', wo.created_date || '—'],
    ['Days open', wo.days_open ?? '—'],
  ];
  document.getElementById('detail-info').innerHTML = infoRows.map(([k, v]) =>
    `<div class="detail-row"><span class="detail-key">${escapeHtml(k)}</span><span class="detail-val">${escapeHtml(v)}</span></div>`
  ).join('');

  // Section 2: Caller info
  const callerCard = document.getElementById('caller-info-card');
  if (!isEmptyValue(wo.caller_name)) {
    const callerLines = [
      `<div class="detail-row"><span class="detail-key">Caller</span><span class="detail-val">${escapeHtml(wo.caller_name)}</span></div>`,
    ];
    if (!isEmptyValue(wo.caller_phone)) {
      callerLines.push(`<div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val"><a href="tel:${escapeHtml(wo.caller_phone)}">${escapeHtml(wo.caller_phone)}</a></span></div>`);
    }
    if (!isEmptyValue(wo.caller_email)) {
      callerLines.push(`<div class="detail-row"><span class="detail-key">Email</span><span class="detail-val"><a href="mailto:${escapeHtml(wo.caller_email)}">${escapeHtml(wo.caller_email)}</a></span></div>`);
    }
    document.getElementById('caller-info').innerHTML = callerLines.join('');
    callerCard.style.display = 'block';
  } else {
    callerCard.style.display = 'none';
  }

  // Section 3: Full description
  document.getElementById('detail-description').textContent = !isEmptyValue(wo.full_description)
    ? wo.full_description
    : (wo.description || 'No description provided.');

  // Section 4: Yardi brief
  document.getElementById('detail-brief').textContent = !isEmptyValue(wo.brief_desc) ? wo.brief_desc : '—';

  // Section 5: Access notes
  const accessBox = document.getElementById('access-box');
  if (!isEmptyValue(wo.access_notes)) {
    accessBox.style.display = 'block';
    document.getElementById('access-notes-text').textContent = wo.access_notes;
  } else {
    accessBox.style.display = 'none';
  }

  // Section 6: AI reason
  const aiBox = document.getElementById('ai-box');
  if (!isEmptyValue(wo.ai_reason)) {
    aiBox.style.display = 'block';
    document.getElementById('ai-reason-text').textContent = wo.ai_reason;
  } else {
    aiBox.style.display = 'none';
  }

  highlightStatusButtons(pendingStatus);

  document.getElementById('tech-notes-input').value = wo.tech_notes || '';
  renderPhotoThumbs(getExistingPhotos());

  document.getElementById('save-status').style.display = 'none';

  showDetailView();
}

function setStatus(status) {
  pendingStatus = status;
  highlightStatusButtons(status);
}

function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    pendingPhotos.push(reader.result);
    renderPhotoThumbs([...getExistingPhotos(), ...pendingPhotos]);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

async function saveChanges() {
  if (!currentWO) return;
  const statusEl = document.getElementById('save-status');
  const photos = [...getExistingPhotos(), ...pendingPhotos];
  const payload = {
    id: currentWO.id,
    status: pendingStatus,
    tech_notes: document.getElementById('tech-notes-input').value,
    photos: photos,
  };

  try {
    const res = await fetch('/api/workorder/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const result = await res.json();
    if (!res.ok || !result.success) throw new Error(result.error || 'Save failed');

    currentWO.status = payload.status;
    currentWO.tech_notes = payload.tech_notes;
    currentWO.photos = photos;
    pendingPhotos = [];
    renderPhotoThumbs(photos);

    const idx = allWorkOrders.findIndex(w => String(w.id) === String(currentWO.id));
    if (idx !== -1) allWorkOrders[idx] = currentWO;

    statusEl.textContent = 'Saved!';
    statusEl.style.color = '#3B6D11';
    statusEl.style.display = 'block';
  } catch (e) {
    statusEl.textContent = 'Error saving. Try again.';
    statusEl.style.color = '#A32D2D';
    statusEl.style.display = 'block';
  }
}

// --- view switching ---

function showListView() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  renderList();
}

function showDetailView() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
}

function showNewWOForm() {
  alert('New work order form coming soon.');
}

// --- event wiring ---

document.getElementById('wo-list').addEventListener('click', (e) => {
  const card = e.target.closest('.wo-card');
  if (!card) return;
  const id = card.getAttribute('data-id');
  const wo = allWorkOrders.find(w => String(w.id) === id);
  if (wo) openDetail(wo);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.getAttribute('data-tab');
    document.getElementById('tech-selector').style.display = currentTab === 'mine' ? 'block' : 'none';
    renderList();
  });
});

document.getElementById('tech-select').addEventListener('change', (e) => {
  currentTech = e.target.value;
  renderList();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.getAttribute('data-filter');
    renderList();
  });
});

// --- init ---

loadWorkOrders();
setInterval(loadWorkOrders, 300000);
</script>
